worker_processes auto;

events {
  worker_connections 4096;
}

http {
  upstream movies_backend {
    server api:8000;
    keepalive 32;
  }
    upstream auth_backend {
    server auth:8000;
    keepalive 32;
  }

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

  server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Auth API
    location /api/v1/auth/ {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://auth_backend;
      proxy_read_timeout 30s;
    }
    location /api/v1/roles/ {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://auth_backend;
      proxy_read_timeout 30s;
    }
    location /api/v1/users/ {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://auth_backend;
      proxy_read_timeout 30s;
    }
    # Movies API
    location /api/v1/ {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://movies_backend;
      proxy_read_timeout 30s;
    }
    # Docs
    location /auth/ {
        proxy_pass http://auth_backend/;
    }
    location /movies/ {
        proxy_pass http://movies_backend/;
    }
    location /auth/openapi.json {
    proxy_pass http://auth_backend/openapi.json;
    }

    location /movies/openapi.json {
        proxy_pass http://movies_backend/openapi.json;
    }
    location = /openapi.json {
    proxy_pass http://auth_backend/openapi.json;
    }
    # Heath
    location = /health {
      return 200 'ok';
    }
  }
}