name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  ugc-content-ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]

    defaults:
      run:
        working-directory: ugc_content_api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run mypy
        run: mypy src tests

      - name: Run tests
        run: pytest

  notification-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: notification

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with wemake
        run: |
          flake8 src tests --format=html --htmldir=flake8-report

      - name: Upload flake8 HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notification-flake8-report-3.11
          path: notification/flake8-report

      - name: Type check with mypy
        run: mypy src

      - name: Run tests
        run: pytest

  profile-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: profile

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: profile_test
          POSTGRES_USER: profile_test
          POSTGRES_PASSWORD: profile_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U profile_test -d profile_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: pip
          cache-dependency-path: profile/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with wemake
        run: |
          flake8 src tests --format=html --htmldir=flake8-report

      - name: Upload flake8 HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profile-flake8-report-3.11
          path: profile/flake8-report
          if-no-files-found: ignore

      - name: Type check with mypy
        run: mypy src tests

      - name: Run unit and API tests
        run: pytest -m "not integration" -v

      - name: Run integration tests
        env:
          TEST_DATABASE_URL: >-
            postgresql+asyncpg://profile_test:profile_test@localhost:5433/profile_test
        run: pytest -m integration -v

  notify:
    name: Telegram notification
    runs-on: ubuntu-latest
    needs:
      - ugc-content-ci
      - notification-ci
      - profile-ci
    if: always()

    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UGC_STATUS: ${{ needs.ugc-content-ci.result }}
          NOTIFICATION_STATUS: ${{ needs.notification-ci.result }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ "$UGC_STATUS" = "success" ] && [ "$NOTIFICATION_STATUS" = "success" ]; then
            MESSAGE="$REPOSITORY: Pipeline for ${COMMIT_SHA} finished successfully!"
          else
            MESSAGE="$REPOSITORY: Pipeline for ${COMMIT_SHA} finished with error!"
            if [ "$UGC_STATUS" != "success" ]; then
              MESSAGE="$MESSAGE ugc-content-ci failed."
            fi
            if [ "$NOTIFICATION_STATUS" != "success" ]; then
              MESSAGE="$MESSAGE notification-ci failed."
            fi
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="$MESSAGE"
