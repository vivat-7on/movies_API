services:
  mongo_single:
    image: mongo:8.0
    container_name: mongo_single
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  ugc_content_api:
    build: .
    container_name: ugc_content_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongo_single


volumes:
  mongo-data: