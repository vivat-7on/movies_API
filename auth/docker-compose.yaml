version: "3.9"

services:
  db:
    image: postgres:16
    container_name: auth_postgres
    restart: always
    env_file:
      - .env
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [
        "CMD-SHELL",
        "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
      ]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  auth-postgres-data: