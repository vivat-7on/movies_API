services:
  postgres:
    image: postgres:16
    container_name: profile-postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - profile-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  profile_test_db:
    image: postgres:16
    container_name: profile-postgres-test
    environment:
      POSTGRES_DB: profile_test
      POSTGRES_USER: profile_test
      POSTGRES_PASSWORD: profile_test
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U profile_test -d profile_test" ]
      interval: 2s
      timeout: 2s
      retries: 20

  profile_migrations:
    build: .
    env_file:
      - .env
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy

  profile_api:
    build: .
    container_name: profile-api
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      profile_migrations:
        condition: service_completed_successfully

volumes:
  profile-postgres-data: