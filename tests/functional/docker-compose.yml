version: "3.9"

services:
  es:
    image: elasticsearch:8.10.1
    container_name: test_es
    restart: always
    env_file:
      - .env
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 50
    volumes:
      - test-movies-es-data:/usr/share/elasticsearch/data
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m

  cache:
    image: redis:5.0.4
    container_name: test_cache
    restart: always
    env_file:
      - .env
    ports:
      - "6379:6379"
    healthcheck:
      test: [
        "CMD-SHELL",
        "redis-cli ping | grep PONG"
      ]
      interval: 1s
      timeout: 3s
      retries: 5
    command: ["redis-server"]

  api:
    build:
      context: ../../backend
    container_name: test_movies_api
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      es:
        condition: service_healthy
      cache:
        condition: service_healthy

volumes:
  test-movies-es-data: